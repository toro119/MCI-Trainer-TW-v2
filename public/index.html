<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>MCI Trainer TW v2</title>
<style>
:root{--navy:#17324d;--blue:#2f6f9f;--bg:#edf3f7;--card:#fff;--line:#d8e1e8;--red:#d94b4b;--yellow:#e5b93f;--green:#3e9b63;--black:#333;--muted:#71808e}
*{box-sizing:border-box}body{margin:0;font-family:"Microsoft JhengHei","Noto Sans TC",sans-serif;background:var(--bg);color:#203040}
header{background:linear-gradient(135deg,var(--navy),var(--blue));color:white;padding:18px}header h1{margin:0;font-size:23px}header p{margin:4px 0 0;opacity:.85}
main{max-width:1180px;margin:auto;padding:16px}.grid{display:grid;grid-template-columns:repeat(12,1fr);gap:12px}.c4{grid-column:span 4}.c5{grid-column:span 5}.c6{grid-column:span 6}.c7{grid-column:span 7}.c8{grid-column:span 8}.c12{grid-column:span 12}
.card{background:#fff;border-radius:14px;padding:16px;box-shadow:0 4px 16px rgba(18,43,63,.08);margin-bottom:12px}
input,select,textarea,button{font:inherit}input,select,textarea{width:100%;padding:11px;border:1px solid var(--line);border-radius:9px;margin:5px 0}textarea{min-height:90px}
button{border:0;border-radius:10px;padding:11px 14px;background:var(--blue);color:#fff;font-weight:700;cursor:pointer}.secondary{background:#e4edf3;color:var(--navy)}
.hidden{display:none}.patients{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:10px}.patient{border:1px solid var(--line);border-radius:12px;padding:12px;background:#fff;cursor:pointer}.patient.selected{outline:3px solid #9fc7e3}.patient.locked{opacity:.5}
.badge{display:inline-block;padding:4px 9px;border-radius:999px;color:#fff;font-weight:800;font-size:12px}.red{background:var(--red)}.yellow{background:var(--yellow);color:#4c3a00}.green{background:var(--green)}.black{background:var(--black)}.gray{background:#87949e}
.stats{display:grid;grid-template-columns:repeat(5,1fr);gap:8px}.stat{background:#f3f7fa;padding:12px;border-radius:10px;text-align:center}.stat b{display:block;font-size:24px}
.notice{background:#fff6d8;padding:10px;border-radius:9px;margin:8px 0}.question{font-size:20px;font-weight:800;margin:16px 0}.choice{display:block;width:100%;text-align:left;margin:8px 0;background:#fff;color:#203040;border:1px solid var(--line)}
.log{max-height:340px;overflow:auto}.log div{padding:7px 0;border-bottom:1px solid #edf0f2}.rolebar{display:flex;justify-content:space-between;gap:10px;align-items:center}.rolebar button{width:auto}.role-switcher{display:flex;gap:8px;flex-wrap:wrap;align-items:center}.role-switcher select{width:auto;min-width:170px}.role-manager{position:fixed;inset:0;background:rgba(0,0,0,.45);display:none;align-items:center;justify-content:center;padding:16px;z-index:9999}.role-manager.open{display:flex}.role-manager-box{background:#fff;border-radius:14px;padding:18px;max-width:420px;width:100%;box-shadow:0 10px 35px rgba(0,0,0,.25)}.role-manager-box label{display:block;padding:8px 0}.role-help{font-size:13px;color:#71808e;margin-top:5px}.timerbar{background:#102b43;color:#fff;padding:11px 14px;border-radius:10px;font-weight:800;margin-bottom:12px;display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap}.scoretable{width:100%;border-collapse:collapse}.scoretable th,.scoretable td{padding:8px;border-bottom:1px solid #e5eaee;text-align:left}.good{color:#237a47}.warn{color:#a05a00}.bad{color:#b42318}
@media(max-width:800px){.c4,.c5,.c6,.c7,.c8,.c12{grid-column:span 12}.stats{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<header><h1>MCI Trainer TW</h1><p>雲端多人測試版 v2.2.1</p></header>
<main>
<section id="lobby">
<div class="grid">
<div class="card c6">
<h3>教官建立房間</h3>
<input id="teacherName" value="教官" placeholder="姓名">
<input id="scenarioName" value="大量傷病患演練" placeholder="案件名稱">
<select id="scenarioType">
<option>遊覽車翻覆</option><option>工廠爆炸</option><option>大型火災</option><option>地震災害</option><option>化學災害</option>
</select>
<select id="patientCount"><option>8</option><option selected>12</option><option>20</option><option>30</option></select>
<button id="createBtn">建立房間</button>
</div>
<div class="card c6">
<h3>加入演練</h3>
<input id="joinName" placeholder="姓名">
<input id="roomCode" inputmode="numeric" placeholder="6位數房間碼">
<div class="notice">
<b>可複選角色（身兼多職）</b><br>
<label><input type="checkbox" class="joinRole" value="commander"> 指揮官</label>
<label><input type="checkbox" class="joinRole" value="primary" checked> 一次檢傷官</label>
<label><input type="checkbox" class="joinRole" value="secondary"> 二次檢傷官</label>
<label><input type="checkbox" class="joinRole" value="transport"> 後送官</label>
<label><input type="checkbox" class="joinRole" value="dashboard"> 戰情中心</label>
</div>
<button id="joinBtn">加入房間</button>
</div>
</div>
</section>

<section id="app" class="hidden">
<div class="card rolebar">
<div><h2 id="roomTitle" style="margin:0"></h2><div id="memberInfo"></div></div>
<div class="role-switcher">
<select id="roleSwitcher" onchange="switchCurrentRole(this.value)"></select>
<button id="manageRolesBtn" class="secondary" onclick="openRoleManager()">管理兼任角色</button>
<button id="leaveBtn" class="secondary">離開</button>
</div>
</div>
<div id="timerBar" class="timerbar"><span>演練狀態：等待開始</span><span>00:00:00</span></div>
<div id="roleView"></div>
</section>
</main>

<div id="roleManager" class="role-manager" onclick="closeRoleManagerOnBackdrop(event)">
  <div class="role-manager-box">
    <h3>管理兼任角色</h3>
    <p class="role-help">至少保留一個角色。儲存後可由上方選單隨時切換。</p>
    <label><input type="checkbox" class="manageRole" value="commander"> 指揮官</label>
    <label><input type="checkbox" class="manageRole" value="primary"> 一次檢傷官</label>
    <label><input type="checkbox" class="manageRole" value="secondary"> 二次檢傷官</label>
    <label><input type="checkbox" class="manageRole" value="transport"> 後送官</label>
    <label><input type="checkbox" class="manageRole" value="dashboard"> 戰情中心</label>
    <div class="grid" style="margin-top:12px">
      <div class="c6"><button onclick="saveManagedRoles()">儲存角色</button></div>
      <div class="c6"><button class="secondary" onclick="closeRoleManager()">取消</button></div>
    </div>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket=io();
let state=null,myRole="",myRoles=[],myName="",flow=null;
let transportChoice={patientIds:[],ambulance:null,hospital:null};

const roleNames={instructor:"教官",commander:"指揮官",primary:"一次檢傷官",secondary:"二次檢傷官",transport:"後送官",dashboard:"戰情中心"};
const labels={red:"紅票",yellow:"黃票",green:"綠票",black:"黑票"};
const badge=(color)=>`<span class="badge ${color||"gray"}">${labels[color]||"未檢傷"}</span>`;
function formatDuration(totalSeconds){
 const sec=Math.max(0,Math.floor(totalSeconds||0));
 return `${String(Math.floor(sec/3600)).padStart(2,"0")}:${String(Math.floor((sec%3600)/60)).padStart(2,"0")}:${String(sec%60).padStart(2,"0")}`;
}
function elapsedSeconds(){
 const ex=state&&state.exercise;
 if(!ex||!ex.startedAt)return 0;
 let endpoint=Date.now();
 if(ex.status==="paused"&&ex.pausedAt)endpoint=ex.pausedAt;
 if(ex.status==="ended"&&ex.endedAt)endpoint=ex.endedAt;
 return Math.max(0,Math.floor((endpoint-ex.startedAt-(ex.pausedTotalMs||0))/1000));
}
function updateTimerBar(){
 const bar=document.getElementById("timerBar");
 if(!bar||!state)return;
 const ex=state.exercise||{status:"waiting"};
 const names={waiting:"等待開始",running:"進行中",paused:"已暫停",ended:"已結束"};
 bar.innerHTML=`<span>演練狀態：${names[ex.status]||"等待開始"}</span><span>${formatDuration(elapsedSeconds())}</span>`;
}
function scoreData(mode){
 const resultKey=mode==="primary"?"primaryResult":"secondaryResult";
 const durationKey=mode==="primary"?"primaryDurationSec":"secondaryDurationSec";
 const done=state.patients.filter(p=>p[resultKey]);
 const correct=done.filter(p=>p[resultKey]===p.correct).length;
 return {
  done:done.length,
  correct,
  accuracy:done.length?Math.round(correct/done.length*1000)/10:0,
  over:done.filter(p=>p[resultKey]==="red"&&p.correct!=="red").length,
  under:done.filter(p=>p.correct==="red"&&p[resultKey]!=="red").length,
  avg:done.length?Math.round(done.reduce((sum,p)=>sum+(p[durationKey]||0),0)/done.length):0
 };
}
function scoreColor(v){return v>=90?"good":v>=75?"warn":"bad";}
function controlExercise(action){
 const map={start:"startExercise",pause:"pauseExercise",resume:"resumeExercise",end:"endExercise"};
 socket.emit(map[action],{},res=>{if(res&&!res.ok)alert(res.message)});
}
function individualScoresHtml(){
 const people={};
 state.patients.forEach(p=>{
  if(p.primaryBy){
   const k=`${p.primaryBy}｜一次`;
   people[k]=people[k]||{count:0,correct:0,total:0};
   people[k].count++; people[k].total+=p.primaryDurationSec||0;
   if(p.primaryResult===p.correct)people[k].correct++;
  }
  if(p.secondaryBy){
   const k=`${p.secondaryBy}｜二次`;
   people[k]=people[k]||{count:0,correct:0,total:0};
   people[k].count++; people[k].total+=p.secondaryDurationSec||0;
   if(p.secondaryResult===p.correct)people[k].correct++;
  }
 });
 const rows=Object.entries(people);
 if(!rows.length)return "尚無個人成績";
 return `<table class="scoretable"><tr><th>人員</th><th>完成</th><th>正確率</th><th>平均秒數</th></tr>${rows.map(([name,v])=>`<tr><td>${name}</td><td>${v.count}</td><td>${Math.round(v.correct/v.count*1000)/10}%</td><td>${Math.round(v.total/v.count)}</td></tr>`).join("")}</table>`;
}


function showApp(){document.getElementById("lobby").classList.add("hidden");document.getElementById("app").classList.remove("hidden")}
function renderRoleSwitcher(){
 const select=document.getElementById("roleSwitcher");
 if(!select)return;
 const roles=myRoles.length?myRoles:[myRole];
 select.innerHTML=roles.map(role=>`<option value="${role}" ${role===myRole?"selected":""}>目前角色：${roleNames[role]}</option>`).join("");
 select.style.display="block";
 select.disabled=roles.length<=1;
 select.title=roles.length<=1?"可按「管理兼任角色」新增角色":"選擇要切換的角色";
}
function switchCurrentRole(role){
 if(!role||role===myRole)return;
 socket.emit("switchRole",{role},res=>{
  if(!res.ok)return alert(res.message||"角色切換失敗");
  myRole=role;
  flow=null;
  transportChoice={patientIds:[],ambulance:null,hospital:null};
  render();
 });
}

function openRoleManager(){
 document.querySelectorAll(".manageRole").forEach(el=>{el.checked=myRoles.includes(el.value)});
 document.getElementById("roleManager").classList.add("open");
}
function closeRoleManager(){
 document.getElementById("roleManager").classList.remove("open");
}
function closeRoleManagerOnBackdrop(event){
 if(event.target.id==="roleManager")closeRoleManager();
}
function saveManagedRoles(){
 const roles=[...document.querySelectorAll(".manageRole:checked")].map(el=>el.value);
 if(!roles.length)return alert("請至少保留一個角色");
 socket.emit("updateRoles",{roles},res=>{
  if(!res.ok)return alert(res.message||"角色更新失敗");
  myRoles=res.roles;
  myRole=res.role;
  flow=null;
  transportChoice={patientIds:[],ambulance:null,hospital:null};
  closeRoleManager();
  render();
 });
}

function statHtml(){
 const patients=state.patients;
 return `<div class="stats">
 <div class="stat"><b>${patients.length}</b>總傷患</div>
 <div class="stat"><b>${patients.filter(p=>p.primaryResult).length}</b>一次檢傷</div>
 <div class="stat"><b>${patients.filter(p=>p.secondaryResult).length}</b>二次檢傷</div>
 <div class="stat"><b>${patients.filter(p=>p.transported).length}</b>已後送</div>
 <div class="stat"><b>${state.resources.filter(r=>r.type==="ambulance"&&r.status==="到達現場").length}</b>可用救護車</div>
 </div>`;
}
function render(){
 if(!state)return;
 document.getElementById("roomTitle").textContent=`房間 ${state.roomCode}｜${state.scenario.name}`;
 document.getElementById("memberInfo").innerHTML=`目前角色：<b>${roleNames[myRole]}</b>　姓名：<b>${myName}</b>　在線：${state.members.length}人<br><small>可用角色：${(myRoles.length?myRoles:[myRole]).map(r=>roleNames[r]).join("／")}</small>`;
 renderRoleSwitcher();
 updateTimerBar();
 if(myRole==="instructor")return renderInstructor();
 if(myRole==="commander")return renderCommander();
 if(myRole==="primary")return renderTriage("primary");
 if(myRole==="secondary")return renderTriage("secondary");
 if(myRole==="transport")return renderTransport();
 renderDashboard();
}
function renderInstructor(){
 const primaryScore=scoreData("primary");
 const secondaryScore=scoreData("secondary");
 document.getElementById("roleView").innerHTML=`<div class="card">${statHtml()}</div>
 <div class="grid">
 <div class="card c6">
  <h3>案情</h3>
  <p>${state.scenario.brief}</p>
  <p><b>地點：</b>${state.scenario.location}</p>
  <p><b>危害：</b>${state.scenario.hazards}</p>
  <div style="font-size:42px;font-weight:900">${state.roomCode}</div>
 </div>
 <div class="card c6">
  <h3>演練控制</h3>
  <div class="grid">
   <div class="c6"><button onclick="controlExercise('start')">▶ 開始演練</button></div>
   <div class="c6"><button class="secondary" onclick="controlExercise('pause')">⏸ 暫停</button></div>
   <div class="c6"><button class="secondary" onclick="controlExercise('resume')">⏯ 繼續</button></div>
   <div class="c6"><button onclick="controlExercise('end')">⏹ 結束演練</button></div>
  </div>
  <p><b>演練時間：</b><span id="instructorElapsed">${formatDuration(elapsedSeconds())}</span></p>
 </div>
 <div class="card c6">
  <h3>一次檢傷成績</h3>
  <p>完成：${primaryScore.done} 人｜正確：${primaryScore.correct} 人</p>
  <p>正確率：<b class="${scoreColor(primaryScore.accuracy)}">${primaryScore.accuracy}%</b></p>
  <p>過度檢傷：${primaryScore.over} 人｜低度檢傷：${primaryScore.under} 人</p>
  <p>平均檢傷時間：${primaryScore.avg} 秒</p>
 </div>
 <div class="card c6">
  <h3>二次檢傷成績</h3>
  <p>完成：${secondaryScore.done} 人｜正確：${secondaryScore.correct} 人</p>
  <p>正確率：<b class="${scoreColor(secondaryScore.accuracy)}">${secondaryScore.accuracy}%</b></p>
  <p>過度檢傷：${secondaryScore.over} 人｜低度檢傷：${secondaryScore.under} 人</p>
  <p>平均檢傷時間：${secondaryScore.avg} 秒</p>
 </div>
 <div class="card c6"><h3>在線角色</h3>${state.members.map(m=>`<div><b>${m.name}</b>｜目前：${roleNames[m.role]}<br><small>兼任：${(m.roles||[m.role]).map(r=>roleNames[r]).join("／")}</small></div>`).join("")}</div>
 <div class="card c6"><h3>個人檢傷表現</h3>${individualScoresHtml()}</div>
 <div class="card c12"><h3>指揮紀錄</h3><div class="log">${state.logs.map(x=>`<div>${x.time}｜${x.text}</div>`).join("")}</div></div>
 </div>`;
 updateTimerBar();
}
function renderCommander(){
 document.getElementById("roleView").innerHTML=`<div class="card">${statHtml()}</div>
 <div class="grid">
 <div class="card c5">
 <h3>建立指揮</h3>
 <select id="sceneSafety"><option>安全</option><option>部分危險</option><option>禁止進入</option></select>
 <textarea id="initialReport" placeholder="METHANE／初報內容"></textarea>
 <button onclick="establishCommand()">建立指揮並儲存初報</button>
 </div>
 <div class="card c7">
 <h3>請求救護車</h3>
 <input id="ambCount" type="number" min="1" max="20" value="3">
 <button onclick="dispatchAmbulances()">隨機派遣並立即到場</button>
 <h3>消防車數量</h3>
 <div class="grid">
 <div class="c4"><label>11 攻擊車</label><input id="fire11" type="number" min="0" value="0"></div>
 <div class="c4"><label>16 攻擊車</label><input id="fire16" type="number" min="0" value="0"></div>
 <div class="c4"><label>61 水庫車</label><input id="fire61" type="number" min="0" value="0"></div>
 <div class="c4"><label>75 救助器材車</label><input id="fire75" type="number" min="0" value="0"></div>
 <div class="c4"><label>213 雲梯車</label><input id="fire213" type="number" min="0" value="0"></div>
 <div class="c4"><label>51 化學車</label><input id="fire51" type="number" min="0" value="0"></div>
 </div>
 <button onclick="dispatchFire()">派遣消防車並立即到場</button>
 <div class="grid" style="margin-top:8px">
 <div class="c4"><button class="secondary" onclick="addUtility('台電')">台電</button></div>
 <div class="c4"><button class="secondary" onclick="addUtility('欣桃瓦斯')">欣桃瓦斯</button></div>
 <div class="c4"><button class="secondary" onclick="addUtility('外縣市支援')">外縣市支援</button></div>
 </div>
 </div>
 <div class="card c6"><h3>現場資源</h3><div class="log">${state.resources.map(r=>`<div>${r.type==="ambulance"?"🚑":r.type==="fire"?"🚒":"🛠️"} <b>${r.name}</b>${r.vehicleType?"（"+r.vehicleType+"）":""}｜${r.status}${r.destination?" → "+r.destination:""}</div>`).join("")||"尚無資源"}</div></div>
 <div class="card c6"><h3>指揮紀錄</h3><div class="log">${state.logs.map(x=>`<div>${x.time}｜${x.text}</div>`).join("")}</div></div>
 </div>`;
}
function establishCommand(){
 socket.emit("establishCommand",{safety:document.getElementById("sceneSafety").value,report:document.getElementById("initialReport").value});
}
function dispatchAmbulances(){
 socket.emit("dispatchAmbulances",{count:Number(document.getElementById("ambCount").value||1)},res=>{if(!res.ok)alert("派遣失敗")});
}
function dispatchFire(){
 socket.emit("dispatchFire",{
  fire11:+document.getElementById("fire11").value,
  fire16:+document.getElementById("fire16").value,
  fire61:+document.getElementById("fire61").value,
  fire75:+document.getElementById("fire75").value,
  fire213:+document.getElementById("fire213").value,
  fire51:+document.getElementById("fire51").value
 },res=>alert(res.ok?"消防車已到場":res.message));
}
function addUtility(name){socket.emit("addUtility",{name})}

function renderTriage(mode){
 const patients=state.patients.filter(p=>mode==="primary"?!p.primaryResult:(p.primaryResult&&!p.secondaryResult));
 document.getElementById("roleView").innerHTML=`<div class="card">${statHtml()}</div>
 <div class="grid">
 <div class="card c4">
 <h3>${mode==="primary"?"一次":"二次"}檢傷官</h3>
 <div class="notice">${mode==="primary"?"依 START 流程完成初次檢傷":"重新評估並保留前後票色"}</div>
 <div class="patients">${patients.map(p=>`<div class="patient ${p.lockedBy?"locked":""}" onclick="${p.lockedBy?"":"startFlow('"+mode+"','"+p.id+"')"}"><b>${p.id}</b><br>${p.sex}｜${p.age}歲<br>${mode==="secondary"?badge(p.primaryResult):""}<br><small>${p.note}</small>${mode==="secondary"&&p.primaryDurationSec?`<br><small>一次檢傷：${p.primaryDurationSec}秒</small>`:""}</div>`).join("")||"目前沒有待檢傷傷患"}</div>
 </div>
 <div class="card c8" id="flowArea"><h3>檢傷操作區</h3><p>請選擇傷患。</p></div>
 </div>`;
 if(flow && flow.mode===mode){
   setTimeout(()=>renderFlow(),0);
 }
}
function startFlow(mode,id){
 flow={mode,id,step:0};
 const area=document.getElementById("flowArea");
 if(area)area.innerHTML="<h3>檢傷操作區</h3><p>正在開啟傷患資料…</p>";
 socket.emit("lockPatient",{patientId:id},res=>{
  if(!res.ok){
   flow=null;
   renderTriage(mode);
   return alert(res.message||"無法開啟傷患");
  }
  renderTriage(mode);
 });
}
function renderFlow(){
 if(!flow||!state)return;
 const patient=state.patients.find(p=>p.id===flow.id);
 const area=document.getElementById("flowArea");
 if(!patient||!area)return;
 const head=`<h3>${patient.id}｜${patient.sex}｜${patient.age}歲</h3>
 <div class="grid">
 <div class="card c6"><b>傷情</b><br>${patient.note}</div>
 <div class="card c6"><b>受傷機轉</b><br>${patient.mechanism}</div>
 <div class="card c6"><b>目前徵象</b><br>${patient.signs}</div>
 <div class="card c6"><b>呼吸速率</b><br>${patient.rr}</div>
 <div class="card c6"><b>目前檢傷時間</b><br><span id="patientTimer">0秒</span></div>
 </div>`;
 const ask=(question,options)=>{area.innerHTML=head+`<div class="question">${question}</div>`+options.map(o=>`<button class="choice" onclick="${o.action}">${o.text}</button>`).join("")};
 if(flow.step===0)ask("可以自行行走嗎？",[{text:"可以",action:"finishFlow('green')"},{text:"不可以",action:"flow.step=1;renderFlow()"}]);
 else if(flow.step===1)ask("有呼吸嗎？",[{text:"有",action:"flow.step=3;renderFlow()"},{text:"無",action:"flow.step=2;renderFlow()"}]);
 else if(flow.step===2)ask("開放呼吸道後是否恢復呼吸？",[{text:"恢復",action:"finishFlow('red')"},{text:"仍無呼吸",action:"finishFlow('black')"}]);
 else if(flow.step===3)ask(`呼吸速率 ${patient.rr}，是否大於30？`,[{text:"是",action:"finishFlow('red')"},{text:"否",action:"flow.step=4;renderFlow()"}]);
 else if(flow.step===4)ask("橈動脈是否摸得到？",[{text:"摸得到",action:"flow.step=5;renderFlow()"},{text:"摸不到",action:"finishFlow('red')"}]);
 else ask("可以遵從簡單命令嗎？",[{text:"可以",action:"finishFlow('yellow')"},{text:"不可以",action:"finishFlow('red')"}]);
}
function finishFlow(result){
 const eventName=flow.mode==="primary"?"submitPrimary":"submitSecondary";
 socket.emit(eventName,{patientId:flow.id,result},res=>{
  if(!res.ok)alert(res.message);
  flow=null;
 });
}

function renderTransport(){
 const waiting=state.patients.filter(p=>(p.secondaryResult||p.primaryResult)&&!p.transported&&(p.secondaryResult||p.primaryResult)!=="black");
 const ambulances=state.resources.filter(r=>r.type==="ambulance"&&r.status==="到達現場");
 document.getElementById("roleView").innerHTML=`<div class="card">${statHtml()}</div>
 <div class="grid">
 <div class="card c4"><h3>待後送傷患</h3><div class="notice">每車最多3人；紅黃不可同車；紅票或黃票每車最多1人。</div>
 <div class="patients">${waiting.map(p=>`<div class="patient ${transportChoice.patientIds.includes(p.id)?"selected":""}" onclick="toggleTransportPatient('${p.id}')"><b>${p.id}</b><br>${badge(p.secondaryResult||p.primaryResult)}</div>`).join("")||"無待後送傷患"}</div></div>
 <div class="card c4"><h3>可用救護車</h3>${ambulances.length?`<div class="patients">${ambulances.map(a=>`<div class="patient ${transportChoice.ambulance===a.name?"selected":""}" onclick="selectAmbulance('${a.name}')"><b>🚑 ${a.name}</b><br>到達現場</div>`).join("")}</div>`:`<div class="notice">現場無可用救護車</div><button onclick="requestMoreAmbulances()">通知指揮官加派</button>`}</div>
 <div class="card c4"><h3>醫院收治患者量能</h3>${state.hospitals.map(h=>`<div class="patient ${transportChoice.hospital===h.name?"selected":""}" onclick="selectHospital('${h.name}')"><b>🏥 ${h.name}</b><br>紅${h.capacity.red}／黃${h.capacity.yellow}／綠${h.capacity.green}</div>`).join("")}</div>
 <div class="card c12"><h3>目前後送編組</h3><div class="notice">傷患：${transportChoice.patientIds.join("、")||"未選擇"}<br>救護車：${transportChoice.ambulance||"未選擇"}<br>醫院：${transportChoice.hospital||"未選擇"}</div><button onclick="confirmTransport()">確認整車後送</button></div>
 <div class="card c12"><h3>後送紀錄</h3><div class="log">${state.transportLogs.map(t=>`<div>${t.time}｜${t.patientIds.join("、")}｜${t.ambulance} → ${t.hospital}｜${t.status}</div>`).join("")||"尚無紀錄"}</div></div>
 </div>`;
}
function toggleTransportPatient(id){
 const ids=transportChoice.patientIds;
 if(ids.includes(id)){transportChoice.patientIds=ids.filter(item=>item!==id);return renderTransport()}
 const trial=[...ids,id];
 const colors=trial.map(patientId=>{const p=state.patients.find(item=>item.id===patientId);return p.secondaryResult||p.primaryResult});
 const redCount=colors.filter(color=>color==="red").length;
 const yellowCount=colors.filter(color=>color==="yellow").length;
 if(trial.length>3)return alert("每台救護車最多3人");
 if(redCount>1)return alert("紅票每車最多1人");
 if(yellowCount>1)return alert("黃票每車最多1人");
 if(redCount&&yellowCount)return alert("紅票與黃票不可同車");
 transportChoice.patientIds=trial;renderTransport();
}
function selectAmbulance(name){transportChoice.ambulance=name;renderTransport()}
function selectHospital(name){transportChoice.hospital=name;renderTransport()}
function requestMoreAmbulances(){socket.emit("requestMoreAmbulances");alert("已通知指揮官")}
function confirmTransport(){
 if(!transportChoice.patientIds.length||!transportChoice.ambulance||!transportChoice.hospital)return alert("請完整選擇傷患、救護車與醫院");
 socket.emit("transport",transportChoice,res=>{
  alert(res.ok?"後送完成":res.message);
  if(res.ok)transportChoice={patientIds:[],ambulance:null,hospital:null};
 });
}

function renderDashboard(){
 const counts={red:0,yellow:0,green:0,black:0};
 state.patients.forEach(p=>{const color=p.secondaryResult||p.primaryResult;if(color)counts[color]+=1});
 document.getElementById("roleView").innerHTML=`<div class="card">${statHtml()}</div>
 <div class="grid">
 <div class="card c6"><h3>目前票色</h3><div class="stats">
 <div class="stat">${badge("red")}<b>${counts.red}</b></div>
 <div class="stat">${badge("yellow")}<b>${counts.yellow}</b></div>
 <div class="stat">${badge("green")}<b>${counts.green}</b></div>
 <div class="stat">${badge("black")}<b>${counts.black}</b></div>
 </div></div>
 <div class="card c6"><h3>最新指揮紀錄</h3><div class="log">${state.logs.map(x=>`<div>${x.time}｜${x.text}</div>`).join("")}</div></div>
 </div>`;
}

document.getElementById("createBtn").onclick=()=>{
 myName=document.getElementById("teacherName").value||"教官";
 myRole="instructor";
 myRoles=["instructor"];
 socket.emit("createRoom",{
  name:myName,
  scenarioName:document.getElementById("scenarioName").value,
  scenarioType:document.getElementById("scenarioType").value,
  patientCount:document.getElementById("patientCount").value
 },res=>{
  if(!res.ok)return alert("建立失敗");
  state=res.state;showApp();render();
 });
};
document.getElementById("joinBtn").onclick=()=>{
 myName=document.getElementById("joinName").value||"未具名";
 myRoles=[...document.querySelectorAll(".joinRole:checked")].map(el=>el.value);
 if(!myRoles.length)return alert("請至少選擇一個角色");
 myRole=myRoles[0];
 socket.emit("joinRoom",{
  roomCode:document.getElementById("roomCode").value,
  name:myName,
  roles:myRoles,
  role:myRole
 },res=>{
  if(!res.ok)return alert(res.message);
  myRoles=[...myRoles];
  state=res.state;showApp();render();
 });
};
document.getElementById("leaveBtn").onclick=()=>location.reload();
setInterval(()=>{
 updateTimerBar();
 const instructorElapsed=document.getElementById("instructorElapsed");
 if(instructorElapsed)instructorElapsed.textContent=formatDuration(elapsedSeconds());
 if(flow&&state){
  const patient=state.patients.find(p=>p.id===flow.id);
  const timer=document.getElementById("patientTimer");
  if(patient&&timer){
   const started=flow.mode==="primary"?patient.primaryStartedAt:patient.secondaryStartedAt;
   timer.textContent=started?Math.max(0,Math.floor((Date.now()-started)/1000))+"秒":"0秒";
  }
 }
},1000);
socket.on("state",newState=>{
 state=newState;
 const candidates=state.members.filter(m=>m.name===myName);
 const me=candidates.find(m=>(m.roles||[m.role]).some(r=>myRoles.includes(r)))||candidates[0];
 if(me){
  myRoles=me.roles||myRoles||[me.role];
  if(myRoles.includes(me.role))myRole=me.role;
 }
 render();
 if(flow){
   const patient=state.patients.find(p=>p.id===flow.id);
   const valid=patient && (flow.mode==="primary"?!patient.primaryResult:(patient.primaryResult&&!patient.secondaryResult));
   if(valid)setTimeout(()=>renderFlow(),0);
   else flow=null;
 }
});
socket.on("alert",payload=>{if(payload.targetRole===myRole)alert(payload.message)});
</script>
</body>
