<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>MCI Trainer TW v2</title>
<style>
:root{--navy:#17324d;--blue:#2f6f9f;--bg:#edf3f7;--card:#fff;--line:#d8e1e8;--red:#d94b4b;--yellow:#e5b93f;--green:#3e9b63;--black:#333;--muted:#71808e}
*{box-sizing:border-box}body{margin:0;font-family:"Microsoft JhengHei","Noto Sans TC",sans-serif;background:var(--bg);color:#203040}
header{background:linear-gradient(135deg,var(--navy),var(--blue));color:white;padding:18px}header h1{margin:0;font-size:23px}header p{margin:4px 0 0;opacity:.85}
main{max-width:1180px;margin:auto;padding:16px}.grid{display:grid;grid-template-columns:repeat(12,1fr);gap:12px}.c4{grid-column:span 4}.c5{grid-column:span 5}.c6{grid-column:span 6}.c7{grid-column:span 7}.c8{grid-column:span 8}.c12{grid-column:span 12}
.card{background:#fff;border-radius:14px;padding:16px;box-shadow:0 4px 16px rgba(18,43,63,.08);margin-bottom:12px}
input,select,textarea,button{font:inherit}input,select,textarea{width:100%;padding:11px;border:1px solid var(--line);border-radius:9px;margin:5px 0}textarea{min-height:90px}
button{border:0;border-radius:10px;padding:11px 14px;background:var(--blue);color:#fff;font-weight:700;cursor:pointer}.secondary{background:#e4edf3;color:var(--navy)}
.hidden{display:none}.patients{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:10px}.patient{border:1px solid var(--line);border-radius:12px;padding:12px;background:#fff;cursor:pointer}
.patient.triage-red{background:#fdeaea;border-color:#e9a4a4}
.patient.triage-yellow{background:#fff7d6;border-color:#e6c95d}
.patient.triage-green{background:#eaf7ef;border-color:#9fd2af}
.patient.triage-black{background:#444;color:#fff;border-color:#222}
.triage-result-card{padding:18px;border-radius:14px;text-align:center;margin:12px 0}
.triage-result-card.red{background:#fdeaea;color:#8f1d1d}
.triage-result-card.yellow{background:#fff4bf;color:#715700}
.triage-result-card.green{background:#e4f5ea;color:#21643d}
.triage-result-card.black{background:#333;color:#fff}
.triage-result-card .level{font-size:28px;font-weight:900}
.triage-result-card .color-name{font-size:20px;font-weight:800}
.triage-result-card .priority{margin-top:6px;font-size:15px}
.change-up{color:#b42318;font-weight:800}.change-down{color:#8a6500;font-weight:800}.change-same{color:#237a47;font-weight:800}.patient.selected{outline:3px solid #9fc7e3}.patient.locked{opacity:.5}
.badge{display:inline-block;padding:4px 9px;border-radius:999px;color:#fff;font-weight:800;font-size:12px}.red{background:var(--red)}.yellow{background:var(--yellow);color:#4c3a00}.green{background:var(--green)}.black{background:var(--black)}.gray{background:#87949e}
.stats{display:grid;grid-template-columns:repeat(5,1fr);gap:8px}.stat{background:#f3f7fa;padding:12px;border-radius:10px;text-align:center}.stat b{display:block;font-size:24px}
.notice{background:#fff6d8;padding:10px;border-radius:9px;margin:8px 0}.toast{position:fixed;right:18px;bottom:18px;background:#17324d;color:#fff;padding:10px 14px;border-radius:10px;box-shadow:0 6px 20px rgba(0,0,0,.22);z-index:9999;opacity:0;transform:translateY(10px);pointer-events:none;transition:.2s}.toast.show{opacity:1;transform:translateY(0)}.question{font-size:20px;font-weight:800;margin:16px 0}.start-steps{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin:12px 0}.start-step{padding:10px;border-radius:10px;background:#eef3f7;text-align:center;font-weight:700}.start-step.active{background:#dcecf8;outline:2px solid #2f6f9f}.start-step.done{background:#e3f4e9}.quick-facts{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin:10px 0}.quick-fact{padding:10px;border-radius:10px;background:#f7fafc;border:1px solid #d8e1e8}@media(max-width:620px){.start-steps{grid-template-columns:repeat(2,1fr)}.quick-facts{grid-template-columns:1fr}}.choice{display:block;width:100%;text-align:left;margin:8px 0;background:#fff;color:#203040;border:1px solid var(--line)}
.intervention-bar{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:12px 0}
.intervention-btn{background:#6b4f2a}
.intervention-btn.done{background:#3e9b63}
.protocol-tag{display:inline-block;padding:5px 9px;border-radius:999px;background:#e8eef3;font-weight:800;margin-bottom:8px}
.action-log{max-height:150px;overflow:auto;background:#f7fafc;border-radius:10px;padding:8px;margin-top:8px}
.warning-box{background:#fdeaea;color:#8f1d1d;border:1px solid #e9a4a4;padding:10px;border-radius:10px;font-weight:800;margin:10px 0}
@media(max-width:620px){.intervention-bar{grid-template-columns:1fr}}
.log{max-height:340px;overflow:auto}.log div{padding:7px 0;border-bottom:1px solid #edf0f2}.rolebar{display:flex;justify-content:space-between;gap:10px;align-items:center}.rolebar button{width:auto}
.bodymap-wrap{display:grid;grid-template-columns:150px 1fr;gap:14px;align-items:center}
.bodymap{position:relative;width:130px;height:220px;margin:auto;background:#f7fafc;border:1px solid #d8e1e8;border-radius:14px}
.bodymap .head,.bodymap .torso,.bodymap .arm,.bodymap .leg{position:absolute;background:#c9d5df}
.bodymap .head{width:40px;height:40px;border-radius:50%;left:45px;top:12px}
.bodymap .torso{width:46px;height:76px;border-radius:16px;left:42px;top:58px}
.bodymap .arm.left{width:16px;height:75px;border-radius:9px;left:20px;top:64px;transform:rotate(12deg)}
.bodymap .arm.right{width:16px;height:75px;border-radius:9px;right:20px;top:64px;transform:rotate(-12deg)}
.bodymap .leg.left{width:18px;height:76px;border-radius:9px;left:42px;top:132px}
.bodymap .leg.right{width:18px;height:76px;border-radius:9px;right:42px;top:132px}
.injury-dot{position:absolute;width:26px;height:26px;border-radius:50%;background:#d94b4b;color:#fff;border:3px solid #fff;box-shadow:0 0 0 2px #d94b4b;display:flex;align-items:center;justify-content:center;font-weight:900}
.head-dot{left:52px;top:18px}.chest-dot{left:52px;top:72px}.abdomen-dot{left:52px;top:106px}.arm-dot{left:14px;top:88px}.leg-dot{left:34px;top:162px}.torso-dot{left:52px;top:92px}
.injury-icons{display:flex;gap:8px;flex-wrap:wrap}.injury-icon{padding:6px 9px;border-radius:999px;background:#eef3f7;font-size:13px}.posture-label{font-size:13px;color:#71808e;margin-top:8px}
@media(max-width:620px){.bodymap-wrap{grid-template-columns:1fr}}.role-switcher{display:flex;gap:8px;flex-wrap:wrap;align-items:center}.role-switcher select{width:auto;min-width:170px}.role-manager{position:fixed;inset:0;background:rgba(0,0,0,.45);display:none;align-items:center;justify-content:center;padding:16px;z-index:9999}.role-manager.open{display:flex}.role-manager-box{background:#fff;border-radius:14px;padding:18px;max-width:420px;width:100%;box-shadow:0 10px 35px rgba(0,0,0,.25)}.role-manager-box label{display:block;padding:8px 0}.role-help{font-size:13px;color:#71808e;margin-top:5px}.timerbar{background:#102b43;color:#fff;padding:11px 14px;border-radius:10px;font-weight:800;margin-bottom:12px;display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap}.scoretable{width:100%;border-collapse:collapse}.scoretable th,.scoretable td{padding:8px;border-bottom:1px solid #e5eaee;text-align:left}.good{color:#237a47}.warn{color:#a05a00}.bad{color:#b42318}
@media(max-width:800px){.c4,.c5,.c6,.c7,.c8,.c12{grid-column:span 12}.stats{grid-template-columns:repeat(2,1fr)}}

.report-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);display:none;z-index:10000;overflow:auto;padding:18px}
.report-overlay.open{display:block}
.report-sheet{max-width:1050px;margin:auto;background:#fff;border-radius:14px;padding:20px;box-shadow:0 12px 40px rgba(0,0,0,.28)}
.report-header{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;border-bottom:2px solid #17324d;padding-bottom:12px;margin-bottom:14px}
.report-title{font-size:28px;font-weight:900;color:#17324d}
.report-actions{display:flex;gap:8px;flex-wrap:wrap}
.report-section{margin:18px 0;break-inside:avoid}
.report-section h3{border-left:6px solid #2f6f9f;padding-left:10px;color:#17324d}
.report-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.report-metric{background:#f3f7fa;border-radius:10px;padding:12px;text-align:center}
.report-metric b{display:block;font-size:24px}
.report-table{width:100%;border-collapse:collapse}
.report-table th,.report-table td{border-bottom:1px solid #dce3e8;padding:8px;text-align:left;vertical-align:top}
.report-patient{border:1px solid #d8e1e8;border-radius:10px;padding:10px;margin:8px 0;break-inside:avoid}
.report-small{font-size:13px;color:#637483}
@media(max-width:760px){.report-grid{grid-template-columns:repeat(2,1fr)}.report-header{display:block}.report-actions{margin-top:10px}}
@media print{
 body *{visibility:hidden!important}
 #reportOverlay,#reportOverlay *{visibility:visible!important}
 #reportOverlay{position:absolute;inset:0;background:#fff;padding:0;display:block!important}
 .report-sheet{max-width:none;box-shadow:none;border-radius:0;padding:10mm}
 .report-actions{display:none!important}
 .report-section{page-break-inside:avoid}
}


.instructor-event-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.instructor-event{background:#fff3cd;border:1px solid #e6c95d;border-radius:10px;padding:9px;margin:6px 0}
.instructor-event b{color:#715700}
@media(max-width:760px){.instructor-event-grid{grid-template-columns:repeat(2,1fr)}}

.report-toolbar{display:flex;gap:8px;flex-wrap:wrap;margin:10px 0}
.health-ok{background:#e4f5ea;border:1px solid #9fd2af;color:#21643d;padding:10px;border-radius:10px}
.health-warning{background:#fff4bf;border:1px solid #e6c95d;color:#715700;padding:10px;border-radius:10px}
.health-item{padding:7px 0;border-bottom:1px solid rgba(0,0,0,.08)}
.replay-overlay{position:fixed;inset:0;background:rgba(0,0,0,.58);display:none;z-index:10020;overflow:auto;padding:18px}
.replay-overlay.open{display:block}
.replay-sheet{max-width:900px;margin:auto;background:#fff;border-radius:14px;padding:20px}
.replay-controls{display:grid;grid-template-columns:1fr auto;gap:10px;align-items:center}
.replay-event{display:grid;grid-template-columns:90px 1fr;gap:12px;border-left:4px solid #2f6f9f;padding:9px 12px;margin:8px 0;background:#f7fafc;border-radius:0 9px 9px 0}
.replay-event.highlight{background:#fff4bf;border-left-color:#c39400}
.replay-time{font-weight:800;color:#17324d}
.comment-box{min-height:110px}
@media(max-width:620px){.replay-event{grid-template-columns:70px 1fr}.report-toolbar button{width:100%}}


.actor-task-card{border:1px solid #d8e1e8;border-left:6px solid #7a4aa8;border-radius:10px;padding:12px;margin:10px 0;background:#faf7fd}
.actor-task-card.active{background:#fff8dd;border-left-color:#c39400}.actor-task-card.success{background:#e8f6ec;border-left-color:#3e9b63}.actor-task-card.failed{background:#fdeaea;border-left-color:#b42318}
.actor-task-title{font-size:18px;font-weight:900}.actor-task-meta{font-size:13px;color:#65727d;margin:5px 0}.actor-task-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
@media(max-width:760px){.actor-task-grid{grid-template-columns:1fr}}

.observer-form{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
.feedback-card{border:1px solid #d8e1e8;border-left:6px solid #4d7c9f;border-radius:10px;padding:12px;margin:10px 0;background:#f7fafc}
.feedback-card.urgent{border-left-color:#b42318;background:#fdeaea}
.feedback-card.resolved{border-left-color:#3e9b63;background:#e8f6ec}
.feedback-title{font-size:17px;font-weight:900}
.feedback-meta{font-size:13px;color:#65727d;margin:4px 0}
.feedback-status{display:inline-block;padding:3px 8px;border-radius:999px;background:#e8eef3;font-size:12px;font-weight:800}
@media(max-width:760px){.observer-form{grid-template-columns:1fr}}

</style>
</head>
<body>
<header><h1>MCI Trainer TW</h1><p>角色選單完整修正版 v3.5.1</p></header>
<main>
<section id="lobby">
<div class="grid">
<div class="card c6">
<h3>教官建立房間</h3>
<input id="teacherName" value="教官" placeholder="姓名">
<input id="scenarioName" value="大量傷病患演練" placeholder="案件名稱">
<select id="scenarioType">
<option>飛機空難</option>
<option>捷運殺人案</option>
<option>火車翻覆</option>
<option>安養院火警</option>
<option>幼兒園火警</option>
<option>遊覽車翻覆</option>
<option>工廠爆炸</option>
<option>大型火災</option>
<option>地震災害</option>
<option>化學災害</option>
</select>
<select id="patientCount">
<option value="6">6 人</option>
<option value="12" selected>12 人</option>
<option value="24">24 人</option>
<option value="36">36 人</option>
<option value="48">48 人</option>
</select>
<button id="createBtn">建立房間</button>
</div>
<div class="card c6">
<h3>加入演練</h3><div class="notice">情境演員可多人加入，也可與其他角色身兼。</div>
<input id="joinName" placeholder="姓名">
<input id="roomCode" inputmode="numeric" placeholder="6位數房間碼">
<div class="notice">
<b>可複選角色（身兼多職）</b><br><small>情境演員與觀察員皆可多人加入。</small><br>
<label><input type="checkbox" class="joinRole" value="commander"> 指揮官</label>
<label><input type="checkbox" class="joinRole" value="primary" checked> 一次檢傷官</label>
<label><input type="checkbox" class="joinRole" value="secondary"> 二次檢傷官</label>
<label><input type="checkbox" class="joinRole" value="transport"> 後送官</label>
<label><input type="checkbox" class="joinRole" value="actor"> 🎭 情境演員</label>
<label><input type="checkbox" class="joinRole" value="observer"> 👀 觀察員</label>
<label><input type="checkbox" class="joinRole" value="dashboard"> 戰情中心</label>
</div>
<button id="joinBtn">加入房間</button>
</div>
</div>
</section>

<section id="app" class="hidden">
<div class="card rolebar">
<div><h2 id="roomTitle" style="margin:0"></h2><div id="memberInfo"></div></div>
<div class="role-switcher">
<select id="roleSwitcher" onchange="switchCurrentRole(this.value)"></select>
<button id="manageRolesBtn" class="secondary" onclick="openRoleManager()">管理兼任角色</button>
<button id="leaveBtn" class="secondary">離開</button>
</div>
</div>
<div id="timerBar" class="timerbar"><span>演練狀態：等待開始</span><span>00:00:00</span></div>
<div id="roleView"></div>
</section>
</main>



<script src="/socket.io/socket.io.js"></script>
<script>
const socket=io();
let state=null,myRole="",myRoles=[],myName="",flow=null;
let transportChoice={patientIds:[],ambulance:null,hospital:null};

const roleNames={instructor:"教官",commander:"指揮官",primary:"一次檢傷官",secondary:"二次檢傷官",transport:"後送官",actor:"情境演員",observer:"觀察員",dashboard:"戰情中心"};
const labels={red:"紅票",yellow:"黃票",green:"綠票",black:"黑票"};
const triageMeta={
 red:{level:"第一級",color:"紅色",priority:"立即處置",emoji:"🔴"},
 yellow:{level:"第二級",color:"黃色",priority:"延遲處置",emoji:"🟡"},
 green:{level:"第三級",color:"綠色",priority:"輕傷",emoji:"🟢"},
 black:{level:"第四級",color:"黑色",priority:"死亡／無救治優先",emoji:"⚫"}
};
function triageLabel(color){
 const meta=triageMeta[color];
 return meta?`${meta.emoji} ${meta.level}｜${meta.color}`:"未檢傷";
}
function triagePriority(color){return triageMeta[color]?.priority||"";}
function effectivePatientColor(patient){
 return patient?.specialPriorityRed ? "red" : (patient?.secondaryResult||patient?.primaryResult||patient?.correct);
}

function triageCardClass(color){return color?`triage-${color}`:"";}
function triageChange(primary,secondary){
 if(!primary||!secondary)return "";
 const order={black:4,red:3,yellow:2,green:1};
 if(order[secondary]>order[primary])return '<span class="change-up">⬆️ 升級</span>';
 if(order[secondary]<order[primary])return '<span class="change-down">⬇️ 降級</span>';
 return '<span class="change-same">➡️ 無變化</span>';
}

const badge=(color)=>`<span class="badge ${color||"gray"}">${labels[color]||"未檢傷"}</span>`;
function respiratoryDisplay(patient){
 if(!patient.breath){
  return patient.afterAirway
   ? `目前無呼吸（RR 0）；打開呼吸道後恢復呼吸${patient.afterAirwayRr?`，恢復後 RR ${patient.afterAirwayRr}`:""}`
   : "目前無呼吸（RR 0）；打開呼吸道後仍無呼吸";
 }
 return `目前有呼吸，RR ${patient.rr} 次／分`;
}
function calculatedCorrectColor(patient){
 if(patient.specialPriorityRed)return "red";
 if(patient.walk)return "green";
 if(!patient.breath)return patient.afterAirway?"red":"black";
 if(patient.triageProtocol==="jumpstart"){
  if(patient.rr<14||patient.rr>45||!patient.pulse||!patient.command)return "red";
  return "yellow";
 }
 if(patient.rr>30||!patient.pulse||!patient.command)return "red";
 return "yellow";
}

function identityText(patient){
 return {pregnant:"🤰 孕婦",rescuer:"👨‍🚒 救災救護人員",civilian:"一般民眾"}[patient.identity]||patient.identityLabel||"一般民眾";
}

function protocolName(patient){
 return patient.triageProtocol==="jumpstart"?"兒童 JumpSTART":"成人 START";
}
function performIntervention(action){
 if(!flow)return;
 socket.emit("performIntervention",{patientId:flow.id,action},res=>{
  if(!res.ok)return alert(res.message||"處置失敗");
  renderFlow();
 });
}
function interventionHtml(patient){
 const actions=patient.interventionLog||[];
 return `<div class="protocol-tag">${protocolName(patient)}</div>
 ${patient.massiveBleeding&&!patient.bleedingControlled?'<div class="warning-box">🩸 大量出血：請先加壓止血</div>':""}
 <div class="intervention-bar">
  <button class="intervention-btn ${patient.bleedingControlled?"done":""}" onclick="performIntervention('pressure')">🩹 ${patient.bleedingControlled?"已加壓止血":"加壓止血"}</button>
  <button class="intervention-btn ${patient.airwayOpened?"done":""}" onclick="performIntervention('airway')">🫁 ${patient.airwayOpened?"已打開呼吸道":"打開呼吸道"}</button>
  ${patient.triageProtocol==="jumpstart"?`<button class="intervention-btn ${patient.rescueBreathsGiven?"done":""}" onclick="performIntervention('fiveBreaths')">💨 ${patient.rescueBreathsGiven?"已給5次人工呼吸":"給5次人工呼吸"}</button>`:""}
 </div>
 <div class="action-log"><b>處置紀錄</b>${actions.length?actions.map(a=>`<div>${a.time}｜${a.operator}｜${a.action}</div>`).join(""):"<div>尚無處置紀錄</div>"}</div>`;
}

function showToast(message){
 const toast=document.getElementById("appToast");
 if(!toast)return;
 toast.textContent=message;
 toast.classList.add("show");
 clearTimeout(showToast.timer);
 showToast.timer=setTimeout(()=>toast.classList.remove("show"),1800);
}

function postureLabel(p){return {standing:"站立",sitting:"坐姿／無法站立",supine:"仰躺／反應不佳",trapped:"受困"}[p]||"未知";}
function injuryIconLabel(i){return {bleeding:"🩸 出血",fracture:"🦴 疑似骨折",burn:"🔥 灼傷／吸入傷",chemical:"☣ 化學暴露",airway:"🫁 呼吸道／胸部問題"}[i]||i;}
function bodyMapHtml(patient){
 const dots=(patient.injuryRegions||[]).map(r=>`<div class="injury-dot ${r}-dot">!</div>`).join("");
 const icons=(patient.injuryIcons||[]).map(i=>`<span class="injury-icon">${injuryIconLabel(i)}</span>`).join("");
 return `<div class="bodymap-wrap">
  <div><div class="bodymap"><div class="head"></div><div class="torso"></div><div class="arm left"></div><div class="arm right"></div><div class="leg left"></div><div class="leg right"></div>${dots}</div><div class="posture-label">姿勢：${postureLabel(patient.posture)}</div></div>
  <div><b>傷勢視覺提示</b><p>紅色標記代表主要受傷區域。</p><div class="injury-icons">${icons||'<span class="injury-icon">無特殊圖示</span>'}</div></div>
 </div>`;
}

function taiwanDateTimeClient(date=new Date()){
 return new Intl.DateTimeFormat("zh-TW",{
  timeZone:"Asia/Taipei",
  year:"numeric",month:"2-digit",day:"2-digit",
  hour:"2-digit",minute:"2-digit",second:"2-digit",
  hour12:false
 }).format(date);
}
function taiwanTimeClient(date=new Date()){
 return new Intl.DateTimeFormat("zh-TW",{
  timeZone:"Asia/Taipei",
  hour:"2-digit",minute:"2-digit",second:"2-digit",
  hour12:false
 }).format(date);
}
function formatDuration(totalSeconds){
 const sec=Math.max(0,Math.floor(totalSeconds||0));
 return `${String(Math.floor(sec/3600)).padStart(2,"0")}:${String(Math.floor((sec%3600)/60)).padStart(2,"0")}:${String(sec%60).padStart(2,"0")}`;
}
function elapsedSeconds(){
 const ex=state&&state.exercise;
 if(!ex||!ex.startedAt)return 0;
 let endpoint=Date.now();
 if(ex.status==="paused"&&ex.pausedAt)endpoint=ex.pausedAt;
 if(ex.status==="ended"&&ex.endedAt)endpoint=ex.endedAt;
 return Math.max(0,Math.floor((endpoint-ex.startedAt-(ex.pausedTotalMs||0))/1000));
}
function updateTimerBar(){
 const bar=document.getElementById("timerBar");
 if(!bar||!state)return;
 const ex=state.exercise||{status:"waiting"};
 const names={waiting:"等待開始",running:"進行中",paused:"已暫停",ended:"已結束"};
 bar.innerHTML=`<span>演練狀態：${names[ex.status]||"等待開始"}</span><span>${formatDuration(elapsedSeconds())}</span>`;
}
function scoreData(mode){
 const resultKey=mode==="primary"?"primaryResult":"secondaryResult";
 const durationKey=mode==="primary"?"primaryDurationSec":"secondaryDurationSec";
 const done=state.patients.filter(p=>p[resultKey]);
 const correct=done.filter(p=>p[resultKey]===calculatedCorrectColor(p)).length;
 return {
  done:done.length,
  correct,
  accuracy:done.length?Math.round(correct/done.length*1000)/10:0,
  over:done.filter(p=>p[resultKey]==="red"&&calculatedCorrectColor(p)!=="red").length,
  under:done.filter(p=>calculatedCorrectColor(p)==="red"&&p[resultKey]!=="red").length,
  avg:done.length?Math.round(done.reduce((sum,p)=>sum+(p[durationKey]||0),0)/done.length):0
 };
}
function scoreColor(v){return v>=90?"good":v>=75?"warn":"bad";}
function controlExercise(action){

}
function individualScoresHtml(){

 (state.patients||[]).forEach(p=>{
  if(p.primaryBy){
   const k=`${p.primaryBy}｜一次`;
   people[k]=people[k]||{count:0,correct:0,total:0};
   people[k].count++; people[k].total+=p.primaryDurationSec||0;
   if(p.primaryResult===calculatedCorrectColor(p))people[k].correct++;
  }
  if(p.secondaryBy){
   const k=`${p.secondaryBy}｜二次`;
   people[k]=people[k]||{count:0,correct:0,total:0};
   people[k].count++; people[k].total+=p.secondaryDurationSec||0;
   if(p.secondaryResult===calculatedCorrectColor(p))people[k].correct++;
  }
 });
 const rows=Object.entries(people);
 if(!rows.length)return "尚無個人成績";
 return `<table class="scoretable"><tr><th>人員</th><th>完成</th><th>正確率</th><th>平均秒數</th></tr>${rows.map(([name,v])=>`<tr><td>${name}</td><td>${v.count}</td><td>${Math.round(v.correct/v.count*1000)/10}%</td><td>${Math.round(v.total/v.count)}</td></tr>`).join("")}</table>`;
}

function reportEscape(value){
 return String(value??"").replace(/[&<>"']/g,ch=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"}[ch]));
}
function safeExerciseElapsedSec(){
 const ex=state&&state.exercise;
 if(!ex||!ex.startedAt)return 0;
 let endpoint=Date.now();
 if(ex.status==="paused"&&ex.pausedAt)endpoint=ex.pausedAt;
 if(ex.status==="ended"&&ex.endedAt)endpoint=ex.endedAt;
 return Math.max(0,Math.floor((endpoint-ex.startedAt-(ex.pausedTotalMs||0))/1000));
}
function reportDuration(){return formatDuration(safeExerciseElapsedSec());}
function personRows(stage){
 const map={};
 (state.patients||[]).forEach(p=>{
  const name=stage==="primary"?p.primaryBy:p.secondaryBy;
  const result=stage==="primary"?p.primaryResult:p.secondaryResult;
  const sec=stage==="primary"?p.primaryDurationSec:p.secondaryDurationSec;
  if(!name||!result)return;
  map[name]=map[name]||{done:0,correct:0,total:0};
  map[name].done++;
  if(result===(p.specialPriorityRed?"red":p.correct))map[name].correct++;
  map[name].total+=sec||0;
 });
 return Object.entries(map).map(([name,v])=>({
  name,done:v.done,
  accuracy:v.done?Math.round(v.correct/v.done*1000)/10:0,
  avg:v.done?Math.round(v.total/v.done):0
 }));
}

function buildExerciseHealthCheck(){
 const issues=[];
 (state.observerFeedback||[]).filter(x=>x.urgent&&x.status!=="resolved").forEach(x=>issues.push({level:"warning",text:`緊急觀察回饋尚未完成：${x.category}｜${x.issue}`}));
 const patients=state.patients||[];
 const hospitals=state.hospitals||[];

 patients.filter(p=>!p.primaryResult).forEach(p=>issues.push({level:"warning",text:`${p.id} 尚未完成一次檢傷`}));
 patients.filter(p=>p.lockedBy&&!p.primaryResult&&!p.secondaryResult).forEach(p=>issues.push({level:"warning",text:`${p.id} 仍處於檢傷鎖定狀態`}));
 patients.filter(p=>p.transported&&!p.primaryResult).forEach(p=>issues.push({level:"warning",text:`${p.id} 未完成一次檢傷即被後送`}));
 patients.filter(p=>p.transported&&(p.secondaryResult||p.primaryResult)==="black").forEach(p=>issues.push({level:"warning",text:`${p.id} 為黑色級數但已列入後送`}));
 patients.filter(p=>p.primaryResult&&p.primaryResult!==calculatedCorrectColor(p)).forEach(p=>issues.push({level:"warning",text:`${p.id} 一次檢傷為${triageLabel(p.primaryResult)}，標準為${triageLabel(calculatedCorrectColor(p))}`}));
 patients.filter(p=>p.secondaryResult&&p.secondaryResult!==calculatedCorrectColor(p)).forEach(p=>issues.push({level:"warning",text:`${p.id} 二次檢傷為${triageLabel(p.secondaryResult)}，標準為${triageLabel(calculatedCorrectColor(p))}`}));
 patients.filter(p=>p.massiveBleeding&&!p.bleedingControlled&&p.primaryResult).forEach(p=>issues.push({level:"warning",text:`${p.id} 有大量出血，但未留下加壓止血紀錄`}));
 patients.filter(p=>!p.breath&&(p.primaryResult||p.secondaryResult)&&(p.airwayOpenCount||0)===0).forEach(p=>issues.push({level:"warning",text:`${p.id} 初始無呼吸，但未留下打開呼吸道紀錄`}));

 hospitals.forEach(h=>{
  const received=(state.transportLogs||[])
   .filter(t=>t.hospital===h.name)
   .reduce((sum,t)=>sum+(t.patientIds||[]).length,0);
  const capacity=Number(h.capacity??h.available??0);
  if(capacity>0&&received>capacity)issues.push({level:"warning",text:`${h.name} 收治 ${received} 人，超過設定量能 ${capacity} 人`});
 });

 return {ok:issues.length===0,issues};
}

}

function buildReplayEvents(){
 const events=[];
 const push=(time,type,text,actor="")=>{
  if(!time||!text)return;
  events.push({time:String(time),type,text:String(text),actor:String(actor||"")});
 };
 (state.logs||[]).forEach(x=>push(x.time,"指揮紀錄",x.text));
 (state.instructorEvents||[]).forEach(x=>push(x.time,"教官事件",x.text,x.by));
 (state.actorTasks||[]).forEach(x=>push(x.time,"情境演員任務",`${x.category}｜${x.behavior}｜強度${x.intensity}`,x.assignedBy));
 (state.observerFeedback||[]).forEach(x=>push(x.time,"觀察員回饋",`${x.category}｜${x.issue}`,x.observer));
 (state.transportLogs||[]).forEach(x=>push(x.time,"後送",`${(x.patientIds||[]).join("、")}｜${x.ambulance} → ${x.hospital}`));
 (state.patients||[]).forEach(p=>{
  (p.triageActions||p.interventionLog||[]).forEach(x=>push(x.time,`${p.id} 處置`,x.action,x.operator));
  if(p.primaryResult)push("",`${p.id} 一次檢傷`,`${triageLabel(p.primaryResult)}｜${p.primaryDurationSec||0}秒`,p.primaryBy);
  if(p.secondaryResult)push("",`${p.id} 二次檢傷`,`${triageLabel(p.secondaryResult)}｜${p.secondaryDurationSec||0}秒`,p.secondaryBy);
 });
 const toSec=t=>{
  const match=String(t).match(/(\d{1,2}):(\d{2}):(\d{2})/);
  return match?(+match[1]*3600 + +match[2]*60 + +match[3]):999999;
 };
 return events.sort((a,b)=>toSec(a.time)-toSec(b.time));
}

function startFlow(mode,id){
 const openNewPatient=()=>{
  flow={mode,id,step:0,pendingResult:null};
  const area=document.getElementById("flowArea");
  if(area)area.innerHTML="<h3>檢傷操作區</h3><p>正在開啟傷患資料…</p>";
  socket.emit("lockPatient",{patientId:id},res=>{
   if(!res.ok){
    flow=null;
    renderTriage(mode);
    return alert(res.message||"無法開啟傷患");
   }
   renderTriage(mode);
  });
 };

 if(flow && flow.id && flow.id!==id){
  const previousId=flow.id;
  socket.emit("cancelTriage",{patientId:previousId},res=>{
   flow=null;
   if(!res.ok)return alert(res.message||"無法解除上一位患者鎖定");
   openNewPatient();
  });
 }else{
  openNewPatient();
 }
}
function renderFlow(){
 if(!flow||!state)return;
 const patient=state.patients.find(p=>p.id===flow.id);
 const area=document.getElementById("flowArea");
 if(!patient||!area)return;

 const isJump=patient.triageProtocol==="jumpstart";
 const head=`<h3>${patient.id}｜${patient.sex}｜${patient.age}歲</h3>
 <div><b>身分：</b>${identityText(patient)}</div>
 <div class="card">${bodyMapHtml(patient)}</div>
 ${interventionHtml(patient)}
 <div class="grid">
  <div class="card c6"><b>傷情</b><br>${patient.note}</div>
  <div class="card c6"><b>受傷機轉</b><br>${patient.mechanism}</div>
  <div class="card c6"><b>行走</b><br>${patient.mobilityDescription||"未提供"}</div>
  <div class="card c6"><b>橈動脈</b><br>${patient.radialPulseDescription||"未提供"}</div>
  <div class="card c6"><b>呼吸狀態</b><br>${respiratoryDisplay(patient)}</div>
  <div class="card c6"><b>意識</b><br>${patient.command?"可遵從指令":"無法遵從指令"}</div>
 </div>
 <button class="secondary" onclick="cancelCurrentTriage()">取消檢傷／回到患者清單</button>`;

 const ask=(question,options)=>{
  area.innerHTML=head+`<div class="question">${question}</div>`+
   options.map(o=>`<button class="choice" onclick="${o.action}">${o.text}</button>`).join("");
 };
 if(patient.specialPriorityRed){
  area.innerHTML=head+`<div class="warning-box">特殊身分：${identityText(patient)}，依演練規則列為第一優先。</div>
  <button class="choice" onclick="finishFlow('red')">確認列為🔴第一級</button>`;
  return;
 }


 if(patient.massiveBleeding&&!patient.bleedingControlled){
  ask("🩸 患者有大量出血，第一個處置？",[
   {text:"加壓止血",action:"performIntervention('pressure')"}
  ]);
  return;
 }

 if(flow.step===0){
  ask("🚶 能否行走？",[
   {text:"可以",action:"finishFlow('green')"},
   {text:"不可以",action:"flow.step=1;renderFlow()"}
  ]);
  return;
 }

 if(flow.step===1){
  ask("🫁 有呼吸嗎？",[
   {text:"有",action:"flow.step=4;renderFlow()"},
   {text:"無",action:"flow.step=2;renderFlow()"}
  ]);
  return;
 }

 if(flow.step===2){
  const requiredOpens=isJump?1:2;
  if((patient.airwayOpenCount||0)<requiredOpens){
   ask(`患者無呼吸，請打開呼吸道${isJump?"":"（最多2次）"}`,[
    {text:`打開呼吸道第 ${(patient.airwayOpenCount||0)+1} 次`,action:"performIntervention('airway')"}
   ]);
   return;
  }
  ask("打開呼吸道後，有呼吸嗎？",[
   {text:"有呼吸",action:"finishFlow('red')"},
   {text:"仍無呼吸",action:isJump?"flow.step=3;renderFlow()":"finishFlow('black')"}
  ]);
  return;
 }

 if(flow.step===3 && isJump){
  ask("❤️ 有脈搏嗎？",[
   {text:"沒有脈搏",action:"finishFlow('black')"},
   {text:"有脈搏",action:"flow.step=31;renderFlow()"}
  ]);
  return;
 }

 if(flow.step===31 && isJump){
  if(!patient.rescueBreathsGiven){
   ask("有脈搏但無呼吸，下一步？",[
    {text:"給予5次人工呼吸",action:"performIntervention('fiveBreaths')"}
   ]);
   return;
  }
  ask("給予5次人工呼吸後，恢復呼吸嗎？",[
   {text:"有呼吸",action:"finishFlow('red')"},
   {text:"仍無呼吸",action:"finishFlow('black')"}
  ]);
  return;
 }

 if(flow.step===4){
  if(isJump){
   ask(`🫁 呼吸速率 ${patient.rr} 次／分，是否介於14～45？`,[
    {text:"低於14或高於45",action:"finishFlow('red')"},
    {text:"介於14～45",action:"flow.step=5;renderFlow()"}
   ]);
  }else{
   ask(`🫁 呼吸速率 ${patient.rr} 次／分`,[
    {text:"大於30",action:"finishFlow('red')"},
    {text:"30以下",action:"flow.step=5;renderFlow()"}
   ]);
  }
  return;
 }

 if(flow.step===5){
  ask("❤️ 評估循環：橈動脈摸得到或 CRT＜2秒嗎？",[
   {text:"循環異常",action:"finishFlow('red')"},
   {text:"循環正常",action:"flow.step=6;renderFlow()"}
  ]);
  return;
 }

 if(isJump){
  ask("🧠 意識狀態？",[
   {text:"清醒，能適當回應",action:"finishFlow('yellow')"},
   {text:"僅對聲音或疼痛有適當反應",action:"finishFlow('yellow')"},
   {text:"無意識或疼痛反應姿勢異常",action:"finishFlow('red')"}
  ]);
 }else{
  ask("🧠 可以遵從簡單指令嗎？",[
   {text:"可以",action:"finishFlow('yellow')"},
   {text:"不可以",action:"finishFlow('red')"}
  ]);
 }
}

function confirmTriageResult(){

  if(!res.ok)return alert(res.message||"送出失敗");

 });

function cancelCurrentTriage(){

  if(!res.ok)return alert(res.message||"取消失敗");
  flow=null;
  renderTriage(mode);
 });
}

function toggleTransportPatient(id){
 const ids=transportChoice.patientIds;
 if(ids.includes(id)){transportChoice.patientIds=ids.filter(item=>item!==id);return renderTransport()}
 const trial=[...ids,id];
 const colors=trial.map(patientId=>{const p=state.patients.find(item=>item.id===patientId);return p.secondaryResult||p.primaryResult});
 const redCount=colors.filter(color=>color==="red").length;
 const yellowCount=colors.filter(color=>color==="yellow").length;
 if(trial.length>3)return alert("每台救護車最多3人");
 if(redCount>1)return alert("紅票每車最多1人");
 if(yellowCount>1)return alert("黃票每車最多1人");
 if(redCount&&yellowCount)return alert("紅票與黃票不可同車");
 transportChoice.patientIds=trial;renderTransport();
}

 socket.emit("transport",transportChoice,res=>{

   return;
  }
  transportChoice={patientIds:[],ambulance:null,hospital:null};
  showToast("救護車已送醫，後送紀錄已更新");
 });
}

function renderDashboard(){
 const counts={red:0,yellow:0,green:0,black:0};
 (state.patients||[]).forEach(p=>{const color=p.secondaryResult||p.primaryResult;if(color)counts[color]+=1});
 document.getElementById("roleView").innerHTML=`<div class="card">${statHtml()}</div>
 <div class="grid">
 <div class="card c6"><h3>目前票色</h3><div class="stats">
 <div class="stat"><b>🔴 第一級</b><br>紅色<b>${counts.red}</b></div>
 <div class="stat"><b>🟡 第二級</b><br>黃色<b>${counts.yellow}</b></div>
 <div class="stat"><b>🟢 第三級</b><br>綠色<b>${counts.green}</b></div>
 <div class="stat"><b>⚫ 第四級</b><br>黑色<b>${counts.black}</b></div>
 </div></div>
 <div class="card c6"><h3>最新指揮紀錄</h3><div class="log">${(state.logs||[]).map(x=>`<div>${x.time}｜${x.text}</div>`).join("")}</div></div>
 </div>`;
}


const scenarioDisplayNames={
 "飛機空難":"飛機空難大量傷病患演練",
 "捷運殺人案":"捷運持刀攻擊大量傷病患演練",
 "火車翻覆":"火車翻覆大量傷病患演練",
 "安養院火警":"安養院火警大量傷病患演練",
 "幼兒園火警":"幼兒園火警大量傷病患演練"
};
document.getElementById("scenarioType").addEventListener("change",event=>{
 const suggested=scenarioDisplayNames[event.target.value];
 if(suggested)document.getElementById("scenarioName").value=suggested;
});

document.getElementById("createBtn").onclick=()=>{
 myName=document.getElementById("teacherName").value||"教官";
 myRole="instructor";
 myRoles=["instructor"];
 socket.emit("createRoom",{
  name:myName,
  scenarioName:document.getElementById("scenarioName").value,
  scenarioType:document.getElementById("scenarioType").value,
  patientCount:document.getElementById("patientCount").value
 },res=>{
  if(!res.ok)return alert("建立失敗");
  state=res.state;showApp();render();
 });
};
document.getElementById("joinBtn").onclick=()=>{
 myName=document.getElementById("joinName").value||"未具名";
 myRoles=[...document.querySelectorAll(".joinRole:checked")].map(el=>el.value);
 if(!myRoles.length)return alert("請至少選擇一個角色");
 myRole=myRoles[0];
 socket.emit("joinRoom",{
  roomCode:document.getElementById("roomCode").value,
  name:myName,
  roles:myRoles,
  role:myRole
 },res=>{
  if(!res.ok)return alert(res.message);
  myRoles=[...myRoles];
  state=res.state;showApp();render();
 });
};
document.getElementById("leaveBtn").onclick=()=>location.reload();
setInterval(()=>{
 updateTimerBar();
 const instructorElapsed=document.getElementById("instructorElapsed");
 if(instructorElapsed)instructorElapsed.textContent=formatDuration(elapsedSeconds());
 if(flow&&state){
  const patient=state.patients.find(p=>p.id===flow.id);
  const timer=document.getElementById("patientTimer");
  if(patient&&timer){
   const started=flow.mode==="primary"?patient.primaryStartedAt:patient.secondaryStartedAt;
   timer.textContent=started?Math.max(0,Math.floor((Date.now()-started)/1000))+"秒":"0秒";
  }
 }
},1000);
socket.on("state",newState=>{
 state=newState;
 const candidates=state.members.filter(m=>m.name===myName);
 const me=candidates.find(m=>(m.roles||[m.role]).some(r=>myRoles.includes(r)))||candidates[0];
 if(me){
  myRoles=me.roles||myRoles||[me.role];
  if(myRoles.includes(me.role))myRole=me.role;
 }
 render();
 if(flow){
   const patient=state.patients.find(p=>p.id===flow.id);
   const valid=patient && (flow.mode==="primary"?!patient.primaryResult:(patient.primaryResult&&!patient.secondaryResult));
   if(valid)setTimeout(()=>renderFlow(),0);
   else flow=null;
 }
});
socket.on("alert",payload=>{if(payload.targetRole===myRole)alert(payload.message)});
</script>

      <div>
        <div class="report-title">MCI Trainer TW｜大量傷病患演練報告</div>
        <div id="reportSubtitle" class="report-small"></div>
      </div>
      <div class="report-actions">
        <button type="button" onclick="exportReportPdf()">📥 匯出 PDF</button>
        <button type="button" class="secondary" onclick="exportPatientsCsv()">📊 患者 Excel</button>
        <button type="button" class="secondary" onclick="exportLearnersCsv()">📈 學員 Excel</button>
        <button type="button" class="secondary" onclick="openReplay()">▶ Replay</button>
        <button class="secondary" onclick="copyReportSummary()">📋 複製摘要</button>
        <button class="secondary" onclick="closeReport()">關閉</button>
      </div>
    </div>
    <div id="reportContent"></div>
  </div>
</div>

  <div class="role-manager-box">
    <h3>管理兼任角色</h3>
    <p class="role-help">至少保留一個角色。儲存後可由上方選單隨時切換。</p>
    <label><input type="checkbox" class="manageRole" value="commander"> 指揮官</label>
    <label><input type="checkbox" class="manageRole" value="primary"> 一次檢傷官</label>
    <label><input type="checkbox" class="manageRole" value="secondary"> 二次檢傷官</label>
    <label><input type="checkbox" class="manageRole" value="transport"> 後送官</label>
    <label><input type="checkbox" class="manageRole" value="actor"> 🎭 情境演員</label>
    <label><input type="checkbox" class="manageRole" value="observer"> 👀 觀察員</label>
    <label><input type="checkbox" class="manageRole" value="dashboard"> 戰情中心</label>
    <div class="grid" style="margin-top:12px">
      <div class="c6"><button onclick="saveManagedRoles()">儲存角色</button></div>
      <div class="c6"><button class="secondary" onclick="closeRoleManager()">取消</button></div>
    </div>
  </div>
</div>

<div id="replayOverlay" class="replay-overlay" onclick="if(event.target.id==='replayOverlay')closeReplay()">
 <div class="replay-sheet">
  <div class="report-header">
   <div>
    <div class="report-title">演練 Replay 時間軸</div>
    <div class="report-small">拖曳時間軸查看該時間點以前的事件</div>
   </div>
   <button class="secondary" onclick="closeReplay()">關閉</button>
  </div>
  <div class="replay-controls">
   <input id="replayRange" type="range" min="0" max="0" value="0" oninput="renderReplayAt(this.value)">
   <b id="replayCounter">0 / 0</b>
  </div>
  <div id="replayCurrent" class="notice"></div>
  <div id="replayEvents"></div>
 </div>
</div>
